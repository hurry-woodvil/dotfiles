##### Terminal / Color #########################################################
# まずは tmux が使う $TERM
set -g default-terminal "tmux-256color"

# TrueColor
# WezTerm: Tc / xterm系: RGB を許可（両対応）
set -as terminal-overrides ",wezterm*:Tc"
set -as terminal-overrides ",xterm-256color:RGB"

# 体感改善（Neovim等のESC遅延）
set -sg escape-time 10


##### Prefix ###################################################################
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

##### Sessions #################################################################
# 現在のディレクトリを引き継いでセッション選択（prefix + M-c）
# ※ ここは「attach-session」より「switch-client」の方が意図に近いことが多い
bind-key M-c switch-client -c "#{pane_current_path}"

bind-key S command-prompt -p "new session:" "new-session -s '%%'"

bind-key s choose-tree -Zs

bind-key R command-prompt -p "rename session:" "rename-session '%%'"

##### Window ############################################################
# Split（見た目が分かりやすいキーに）
unbind %
bind-key | split-window -h -c "#{pane_current_path}"

unbind '"'
bind-key - split-window -v -c "#{pane_current_path}"

bind-key X kill-window

set -g renumber-windows on

##### Pane ############################################################
# Pane move
bind-key C-h select-pane -L
bind-key C-l select-pane -R
bind-key C-j select-pane -D
bind-key C-k select-pane -U

# Pane resize（prefix + hjkl）
bind-key h resize-pane -L 5
bind-key l resize-pane -R 5
bind-key j resize-pane -D 5
bind-key k resize-pane -U 5

# ペイン削除確認なし
bind-key x kill-pane

# Zoom toggle
bind-key -r m resize-pane -Z

# マウス
set -g mouse on

##### Status Line ###################################################################
# 更新間隔
set -g status-interval 5
set -g status-position bottom

# 全体背景
set -g status-style bg=#1a1b26,fg=#c0caf5

# Powerline区切り文字
set -g @arrow_left ""
set -g @arrow_right ""

# 左側（セッション名）
set -g status-left-length 60
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26] "

# ウィンドウ表示
set -g window-status-format " #[fg=#a9b1d6]#I:#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#bb9af7,bold] #I:#W #[fg=#bb9af7,bg=#1a1b26]"

# 右側（ホスト + 時刻）
set -g status-right-length 80
set -g status-right "#[fg=#73daca,bg=#1a1b26]#[fg=#1a1b26,bg=#73daca] #H #[fg=#f7768e,bg=#1a1b26]#[fg=#1a1b26,bg=#f7768e] %H:%M #[default]"

##### Copy Mode ###############################################################
setw -g mode-keys vi

# vで選択開始 / yでコピー（macOSクリップボードへ）
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# マウスドラッグでコピーしてもcopy-modeを抜けない
unbind -T copy-mode-vi MouseDragEnd1Pane


##### Config Reload ############################################################
unbind r
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

##### TPM Plugins ##############################################################
set -g @plugin 'tmux-plugins/tpm'

# 主要プラグイン
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect / continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# TPM init（必ず一番下）
run '~/.tmux/plugins/tpm/tpm'
